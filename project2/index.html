<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimea Poster</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="poster">

    <div class="title">
        <h1>CRIMEA</h1>
        <p>Mountains • Sea • Nature • History</p>
    </div>

    <div class="circle"></div>
    <div class="circle2"></div>


    <div class="gallery">

        <div class="photo large">
            <img src="images/crimea1.png">
        </div>

        <div class="photo small">
            <img src="images/crimea2.jpg">
        </div>

        <div class="photo small">
            <img src="images/crimea3.jpg">
        </div>

    </div>

    <div class="info">

        <div>
            <h2>Location</h2>
            <p>44.95° N</p>
            <p>34.10° E</p>
        </div>

        <div>
            <h2>Places</h2>
            <p>•Simferopol</p>
            <p>•Sudak</p>
            <p>•Bakhchisaray</p>
            <p>•Yalta</p>
        </div>

        <div>
            <h2>About</h2>
            <p>
                Crimea is known for its mountains,
                beautiful coastline,
                old cities,
                and amazing views.
            </p>
        </div>

    </div>

</div>

</body>
</html>
